name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Run extension tests
        run: cd extension && bun vitest run

      - name: Run app tests
        run: cd app && bun vp test
        continue-on-error: true

      - name: Lint extension
        run: cd extension && bun oxlint

      - name: Lint app
        run: cd app && bun oxlint

      - name: Build app
        run: cd app && bun run build

      - name: Build Docker image
        run: docker build -t apara .
